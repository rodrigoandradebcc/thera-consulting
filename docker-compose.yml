services:
  postgres:
    image: postgres:17-alpine
    container_name: ovgs-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: thera
      POSTGRES_PASSWORD: thera
      POSTGRES_DB: thera
    ports:
      - '5432:5432'
    volumes:
      - ovgs-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U thera -d thera']
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    profiles: ['full']
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: ovgs-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://thera:thera@postgres:5432/thera
      PORT: '3000'
      WEB_ORIGIN: http://localhost:5173
    ports:
      - '3000:3000'

volumes:
  ovgs-pgdata:
